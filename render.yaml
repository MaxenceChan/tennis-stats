services:
  # ---------------------------- Backend FastAPI ------------------------------
  - type: web
    name: tennis-stats-api
    runtime: python
    region: frankfurt
    plan: free                # 750 h/mois, sleep après 15 min — réveillé par le cron GH Actions
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false           # à remplir avec ton URL Neon (cf. README)
      - key: CORS_ORIGINS
        sync: false           # à remplir avec l'URL du frontend
      - key: ADMIN_TOKEN
        generateValue: true
      - key: ENABLE_SCHEDULER
        value: "false"        # cron externe (GitHub Actions)
      - key: USER_AGENT
        value: "tennis-stats-bot/0.1 (https://github.com/MaxenceChan/tennis-stats)"
      - key: SCRAPE_DELAY_SEC
        value: "2.0"
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ---------------------------- Frontend (static) ----------------------------
  - type: web
    name: tennis-stats-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

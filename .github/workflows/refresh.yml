name: Refresh data

# Le runner GH Actions (IP Azure) scrape les sources puis POST les données
# vers l'API Render. L'API Render ne fait plus aucun scraping.
#
# Sources actuellement utilisables :
#   - raw.githubusercontent.com (Sackmann CSVs) : 100% OK partout
#   - live-tennis.eu, tennisabstract.com, atptour.com : 403 sur IP cloud
#
# Donc par défaut on utilise les CSVs Sackmann (rankings + bios + matches).

on:
  schedule:
    - cron: "0 6 * * *"        # Tous les jours 06:00 UTC — BDL rankings (live, à jour)
    - cron: "0 4 1 * *"        # 1er du mois 04:00 UTC — full refresh (Sackmann + BDL)
  workflow_dispatch:
    inputs:
      mode:
        description: "probe | sackmann | sackmann-players | sackmann-rankings | sackmann-matches | bdl | bdl-rankings | bdl-tournaments | elo | full"
        required: true
        default: bdl
      years:
        description: "Sackmann match years (comma-sep, ex: 2022,2023,2024)"
        required: false
        default: "2024"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      API_URL: ${{ secrets.API_URL }}
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Pick mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "years=${{ github.event.inputs.years }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 4 1 * *" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "years=2022,2023,2024" >> "$GITHUB_OUTPUT"
          else
            echo "mode=bdl" >> "$GITHUB_OUTPUT"
            echo "years=2024" >> "$GITHUB_OUTPUT"
          fi

      - name: Wake the API (Render free tier sleeps after 15 min)
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsS "$API_URL/health"; then echo " — awake"; break; fi
            echo "wake attempt $i…"; sleep 10
          done

      - name: Scrape and push
        working-directory: backend
        run: |
          python -m scripts.scrape_to_api ${{ steps.mode.outputs.mode }} \
            --years "${{ steps.mode.outputs.years }}" \
            --rankings-limit 1000

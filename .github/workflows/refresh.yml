name: Refresh data

# Le runner GH Actions (IP Azure) scrape les sources puis POST les données
# vers l'API Render. L'API Render ne fait plus aucun scraping, elle ne fait
# que recevoir et stocker.

on:
  schedule:
    - cron: "*/30 * * * *"     # toutes les 30 min — rankings
    - cron: "0 4 * * *"        # 04:00 UTC quotidien — refresh complet
  workflow_dispatch:
    inputs:
      mode:
        description: "rankings | calendar | bios | matches | elo | full"
        required: true
        default: rankings
      limit:
        description: "Nombre de joueurs (bios/matches)"
        required: false
        default: "50"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      API_URL: ${{ secrets.API_URL }}             # ex: https://tennis-stats-api-tz1h.onrender.com
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps (for scrapers)
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Pick mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "limit=${{ github.event.inputs.limit }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 4 * * *" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "limit=50" >> "$GITHUB_OUTPUT"
          else
            echo "mode=rankings" >> "$GITHUB_OUTPUT"
            echo "limit=50" >> "$GITHUB_OUTPUT"
          fi

      - name: Wake the API (Render free tier sleeps after 15 min)
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsS "$API_URL/health"; then echo " — awake"; break; fi
            echo "wake attempt $i…"; sleep 10
          done

      - name: Scrape and push
        working-directory: backend
        run: |
          python -m scripts.scrape_to_api ${{ steps.mode.outputs.mode }} \
            --limit ${{ steps.mode.outputs.limit }} \
            --rankings-limit 1000
